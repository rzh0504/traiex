<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <clipPath id="a">
        <circle cx="60" cy="60" r="47"></circle>
    </clipPath>

    <!-- 上色条 -->
    <rect fill="#727B96" clip-path="url(#a)" x="10" y="10" width="100" height="30"></rect>

    <!-- 中间透明条 -->
    <rect fill="transparent" clip-path="url(#a)" x="10" y="40" width="100" height="40"></rect>

    <!-- 下色条 -->
    <rect fill="#727B96" clip-path="url(#a)" x="10" y="80" width="100" height="30"></rect>

    <!-- 外部细线描边 -->
    <circle cx="60" cy="60" r="47" fill="none" stroke="#727B96" stroke-width="1"></circle>
</svg>
